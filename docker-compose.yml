x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-base: &app-base
  image: wgbot:local
  build: .
  restart: unless-stopped
  init: true
  env_file:
    - .env
  network_mode: host
  logging: *default-logging

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    init: true
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    network_mode: host
    logging: *default-logging

  wgbot:
    <<: *app-base
    container_name: wgbot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - WG_DASHBOARD_URL=${WG_DASHBOARD_URL}
      - WG_DASHBOARD_API_KEY=${WG_DASHBOARD_API_KEY}
      - DATABASE_PATH=/app/data/wgbot.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DOMAIN=${DOMAIN}
    volumes:
      - ./DB:/app/data
      - ./logs:/app/logs
      - ./clients.json:/app/clients.json
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; response = requests.get('http://localhost:8001/health', timeout=5); exit(0 if response.ok else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
