x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  wgbot:
    image: ${WGBOT_IMAGE:-wgbot:local}
    build:
      context: .
    container_name: wgbot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/wgbot.db
      CASCADE_SERVERS_FILE: /run/secrets/cascade_servers.json
      CASCADE_REQUEST_TIMEOUT: ${CASCADE_REQUEST_TIMEOUT:-20}
      CASCADE_RESERVATION_MINUTES: ${CASCADE_RESERVATION_MINUTES:-30}
      CASCADE_RETRY_INTERVAL_SECONDS: ${CASCADE_RETRY_INTERVAL_SECONDS:-60}
      PROVISIONING_LEASE_SECONDS: ${PROVISIONING_LEASE_SECONDS:-300}
      WEBHOOK_MAX_BODY_BYTES: ${WEBHOOK_MAX_BODY_BYTES:-65536}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./DB:/app/data
      - ./secrets/cascade_servers.json:/run/secrets/cascade_servers.json:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 30s
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
