x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-base: &app-base
  image: ${WGBOT_IMAGE:-wgbot:local}
  build:
    context: .
  restart: unless-stopped
  init: true
  env_file:
    - .env
  network_mode: host
  logging: *default-logging

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    init: true
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    network_mode: host
    logging: *default-logging

  wgbot:
    <<: *app-base
    container_name: wgbot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - DATABASE_PATH=/app/data/wgbot.db
      - CASCADE_SERVERS_FILE=/run/secrets/cascade_servers.json
      - CASCADE_REQUEST_TIMEOUT=${CASCADE_REQUEST_TIMEOUT:-20}
      - CASCADE_RESERVATION_MINUTES=${CASCADE_RESERVATION_MINUTES:-30}
      - CASCADE_RETRY_INTERVAL_SECONDS=${CASCADE_RETRY_INTERVAL_SECONDS:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DOMAIN=${DOMAIN}
    volumes:
      - ./DB:/app/data
      - ./logs:/app/logs
      - ./secrets/cascade_servers.json:/run/secrets/cascade_servers.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
