name: Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, for example: 19b916807b938fd9e533027b0265ca485ad64209'
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rollback:
    name: Roll back VPS to selected image tag
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/wgbot_deploy_key
          chmod 600 ~/.ssh/wgbot_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Roll back on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/wgbot_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' IMAGE='$IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"

          mkdir -p backups
          backup_timestamp="$(date +%Y%m%d-%H%M%S)"
          if [ -f DB/wgbot.db ]; then
            cp DB/wgbot.db "backups/wgbot.db.rollback.${backup_timestamp}"
          fi
          if [ -f clients.json ]; then
            cp clients.json "backups/clients.json.rollback.${backup_timestamp}"
          fi

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE"

          WGBOT_IMAGE="$IMAGE" docker compose up -d --no-build wgbot

          sleep 10
          curl -fsS http://localhost:8001/health
          WGBOT_IMAGE="$IMAGE" docker compose ps wgbot
          WGBOT_IMAGE="$IMAGE" docker compose logs --tail=100 wgbot
          REMOTE
