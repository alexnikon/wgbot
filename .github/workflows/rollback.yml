name: Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, for example: 19b916807b938fd9e533027b0265ca485ad64209'
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rollback:
    name: Roll back VPS to selected image tag
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate image tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ ! "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_tag must be a full 40-character lowercase commit SHA" >&2
            exit 1
          fi

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/wgbot_deploy_key
          chmod 600 ~/.ssh/wgbot_deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Roll back on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
          printf 'DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
          printf 'IMAGE=%q\n' "$IMAGE"
          printf 'GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
          printf 'GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
          cat <<'REMOTE'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"

          test -r .env
          test -r secrets/cascade_servers.json
          mkdir -p DB
          test -w DB
          python3 scripts/backup_runtime.py --root "$DEPLOY_PATH" --label rollback

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE"

          test -r docker-compose.yml
          test -r scripts/backup_runtime.py

          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
            up -d --no-build --remove-orphans wgbot

          for attempt in $(seq 1 12); do
            if curl -fsS http://localhost:8001/health; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
                logs --tail=150 wgbot
              exit 1
            fi
            sleep 5
          done
          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot ps wgbot
          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
            logs --tail=100 wgbot
          docker image prune -f --filter "until=168h"
          REMOTE
          } | ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -i ~/.ssh/wgbot_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s

      - name: Rollback summary
        run: |
          {
            echo "## Rollback completed"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
