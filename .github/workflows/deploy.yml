name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_SHA: ${{ github.sha }}

jobs:
  validate:
    name: Run CI before production deployment
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    name: Build image and deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/wgbot_deploy_key
          chmod 600 ~/.ssh/wgbot_deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload runtime assets
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_PORT }}
        run: |
          archive="/tmp/wgbot-runtime-${DEPLOY_SHA}.tgz"
          tar -czf "$archive" docker-compose.yml scripts/backup_runtime.py
          scp -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -i ~/.ssh/wgbot_deploy_key -P "$VPS_PORT" \
            "$archive" "$VPS_USER@$VPS_HOST:.wgbot-runtime-${DEPLOY_SHA}.tgz"
          rm -f "$archive"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_SHA }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEGACY_DEPLOY_PATH: ${{ vars.LEGACY_DEPLOY_PATH || '/home/alex/wgbot' }}
        run: |
          {
          printf 'DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
          printf 'LEGACY_DEPLOY_PATH=%q\n' "$LEGACY_DEPLOY_PATH"
          printf 'IMAGE=%q\n' "$IMAGE"
          printf 'DEPLOY_SHA=%q\n' "$DEPLOY_SHA"
          printf 'GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
          printf 'GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
          cat <<'REMOTE'
          set -Eeuo pipefail

          archive="$HOME/.wgbot-runtime-${DEPLOY_SHA}.tgz"
          staging="$(mktemp -d)"
          legacy_stopped=0
          cleanup() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$legacy_stopped" -eq 1 ]; then
              docker start wgbot >/dev/null 2>&1 || true
            fi
            rm -rf "$staging" "$archive"
            exit "$status"
          }
          trap cleanup EXIT

          test -r "$archive"
          tar -xzf "$archive" -C "$staging"
          test -r "$staging/docker-compose.yml"
          test -r "$staging/scripts/backup_runtime.py"

          mkdir -p "$DEPLOY_PATH/DB" "$DEPLOY_PATH/backups" \
            "$DEPLOY_PATH/scripts" "$DEPLOY_PATH/secrets"

          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            test -r "$LEGACY_DEPLOY_PATH/.env"
            install -m 600 "$LEGACY_DEPLOY_PATH/.env" "$DEPLOY_PATH/.env"
          fi
          if [ ! -f "$DEPLOY_PATH/secrets/cascade_servers.json" ]; then
            test -r "$LEGACY_DEPLOY_PATH/secrets/cascade_servers.json"
            install -m 600 "$LEGACY_DEPLOY_PATH/secrets/cascade_servers.json" \
              "$DEPLOY_PATH/secrets/cascade_servers.json"
          fi
          bootstrap_database=0
          if [ ! -f "$DEPLOY_PATH/DB/wgbot.db" ]; then
            test -r "$LEGACY_DEPLOY_PATH/DB/wgbot.db"
            bootstrap_database=1
          fi

          install -m 644 "$staging/docker-compose.yml" "$DEPLOY_PATH/docker-compose.yml"
          install -m 755 "$staging/scripts/backup_runtime.py" \
            "$DEPLOY_PATH/scripts/backup_runtime.py"

          cd "$DEPLOY_PATH"

          test -r .env
          test -r secrets/cascade_servers.json
          test -w DB
          if [ "$bootstrap_database" -eq 0 ]; then
            python3 scripts/backup_runtime.py --root "$DEPLOY_PATH" --label production
          fi

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE"

          if [ "$bootstrap_database" -eq 1 ]; then
            if docker inspect wgbot >/dev/null 2>&1; then
              docker stop --time 30 wgbot >/dev/null
              legacy_stopped=1
            fi
            python3 - "$LEGACY_DEPLOY_PATH/DB/wgbot.db" \
              "$DEPLOY_PATH/DB/wgbot.db" <<'PYTHON'
          import sqlite3
          import sys
          from pathlib import Path

          source_path = Path(sys.argv[1]).resolve()
          target_path = Path(sys.argv[2]).resolve()
          temporary_path = target_path.with_suffix(".bootstrap.tmp")
          temporary_path.unlink(missing_ok=True)
          source = sqlite3.connect(f"file:{source_path}?mode=ro", uri=True)
          target = sqlite3.connect(temporary_path)
          try:
              source.backup(target)
              result = target.execute("PRAGMA integrity_check").fetchone()
              if not result or result[0] != "ok":
                  raise RuntimeError("Bootstrap database integrity check failed")
          finally:
              target.close()
              source.close()
          temporary_path.replace(target_path)
          PYTHON
            python3 scripts/backup_runtime.py --root "$DEPLOY_PATH" --label production
          fi

          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
            up -d --no-build --remove-orphans wgbot
          legacy_stopped=0

          for attempt in $(seq 1 12); do
            if curl -fsS http://localhost:8001/health; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
                logs --tail=150 wgbot
              exit 1
            fi
            sleep 5
          done
          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot ps wgbot
          WGBOT_IMAGE="$IMAGE" docker compose --project-name wgbot \
            logs --tail=100 wgbot
          docker image prune -f --filter "until=168h"
          REMOTE
          } | ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -i ~/.ssh/wgbot_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s

      - name: Deployment summary
        run: |
          {
            echo "## Deployment completed"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_SHA }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
