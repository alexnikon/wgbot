name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build image and deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/wgbot_deploy_key
          chmod 600 ~/.ssh/wgbot_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/wgbot_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' IMAGE='$IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"

          mkdir -p backups
          backup_timestamp="$(date +%Y%m%d-%H%M%S)"
          if [ -f DB/wgbot.db ]; then
            cp DB/wgbot.db "backups/wgbot.db.${backup_timestamp}"
          fi
          if [ -f clients.json ]; then
            cp clients.json "backups/clients.json.${backup_timestamp}"
          fi

          git fetch --prune origin
          git checkout main
          git pull --ff-only origin main

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE"

          WGBOT_IMAGE="$IMAGE" docker compose up -d --no-build wgbot

          sleep 10
          curl -fsS http://localhost:8001/health
          WGBOT_IMAGE="$IMAGE" docker compose ps wgbot
          WGBOT_IMAGE="$IMAGE" docker compose logs --tail=100 wgbot
          docker image prune -f --filter "until=168h"
          REMOTE

      - name: Deployment summary
        run: |
          {
            echo "## Deployment completed"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`"
            echo "- Server: \`${{ secrets.VPS_HOST }}\`"
            echo "- Path: \`${{ secrets.DEPLOY_PATH }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
